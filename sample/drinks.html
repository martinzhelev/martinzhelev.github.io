<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinks Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .menu-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <header class="bg-white shadow-md sticky top-0 z-10">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-gray-800 logoFirm cursor-pointer">
                <i class="fas fa-mug-hot"></i> <span data-key="theCafe">The Cafe</span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="index.html" class="text-gray-600 hover:text-gray-800 flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i><span data-key="backToMenu">Back to Menu</span>
                </a>
                <div class="text-sm">
                    <button id="lang-en" class="font-semibold hover:text-blue-500 transition-colors">EN</button>
                    <span class="text-gray-300">|</span>
                    <button id="lang-bg" class="font-semibold hover:text-blue-500 transition-colors">BG</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-16">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-gray-800" data-key="drinksTitle">Drinks</h1>
            <p class="text-xl text-gray-600 mt-2" data-key="drinksSubtitle">Quench your thirst.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-12">
            <!-- Alcoholic Drinks -->
            <div id="alcoholicDrinks" class="menu-card bg-cover bg-center rounded-lg overflow-hidden cursor-pointer h-80" style="background-image: url('https://images.unsplash.com/photo-1514362545857-3bc7dca47259?q=80&w=1000&auto=format&fit=crop');">
                <div class="bg-black bg-opacity-50 h-full flex items-center justify-center">
                    <h2 class="text-4xl font-bold text-white" data-key="alcoholicDrinks">Alcoholic Drinks</h2>
                </div>
            </div>

            <!-- Non-Alcoholic Drinks -->
            <div id="nonAlcoholicDrinks" class="menu-card bg-cover bg-center rounded-lg overflow-hidden cursor-pointer h-80" style="background-image: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=1000&auto=format&fit=crop');">
                <div class="bg-black bg-opacity-50 h-full flex items-center justify-center">
                    <h2 class="text-4xl font-bold text-white" data-key="nonAlcoholicDrinks">Non-Alcoholic Drinks</h2>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white p-4 text-center mt-16">
        <p data-key="copyright">&copy; 2025 The Cafe. All rights reserved.</p>
    </footer>

    <script src="JS/translations.js"></script>
    <script src="JS/main.js"></script>
</body>
</html>
