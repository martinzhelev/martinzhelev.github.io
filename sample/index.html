<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .menu-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans">
    <header class="bg-white dark:bg-gray-800 shadow-md">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-gray-800 dark:text-gray-200 logoFirm cursor-pointer">
                <i class="fas fa-mug-hot"></i> <span data-key="theCafe">The Cafe</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-sm">
                    <button id="lang-en" class="font-semibold text-gray-800 dark:text-gray-200 hover:text-blue-500 transition-colors">EN</button>
                    <span class="text-gray-300 dark:text-gray-600">|</span>
                    <button id="lang-bg" class="font-semibold text-gray-800 dark:text-gray-200 hover:text-blue-500 transition-colors">BG</button>
                </div>
                <button id="theme-toggle" type="button" class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 rounded-lg text-sm p-2.5">
                    <i id="theme-toggle-dark-icon" class="fas fa-moon"></i>
                    <i id="theme-toggle-light-icon" class="hidden fas fa-sun"></i>
                </button>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-10 md:py-16">
        <div class="text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 dark:text-white mb-4" data-key="welcome">Welcome!</h1>
            <p class="text-xl text-gray-600 dark:text-gray-400 mb-12" data-key="exploreMenu">Explore our delicious menu.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6 md:gap-12">
            <!-- Drinks Card -->
            <div id="drinks-card" class="menu-card bg-cover bg-center rounded-lg overflow-hidden cursor-pointer h-64 md:h-80" style="background-image: url('https://images.unsplash.com/photo-1544145945-f90425340c7e?q=80&w=1000&auto=format&fit=crop');">
                <div class="bg-black bg-opacity-50 h-full flex items-center justify-center text-center p-4">
                    <h2 class="text-4xl font-bold text-white" data-key="drinks">Drinks</h2>
                </div>
            </div>

            <!-- Food Card -->
            <div id="food-card" class="menu-card bg-cover bg-center rounded-lg overflow-hidden cursor-pointer h-64 md:h-80" style="background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1000&auto=format&fit=crop');">
                <div class="bg-black bg-opacity-50 h-full flex items-center justify-center text-center p-4">
                    <h2 class="text-4xl font-bold text-white" data-key="food">Food</h2>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 dark:bg-black text-white p-4 text-center mt-16">
        <p class="dark:text-gray-300" data-key="copyright">&copy; 2025 The Cafe. All rights reserved.</p>
    </footer>

    <script src="JS/translations.js"></script>
    <script src="JS/main.js"></script>
</body>
</html>
