<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .menu-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-gray-800 logoFirm cursor-pointer">
                <i class="fas fa-mug-hot"></i> <span data-key="theCafe">The Cafe</span>
            </div>
            <div class="text-sm">
                <button id="lang-en" class="font-semibold hover:text-blue-500 transition-colors">EN</button>
                <span class="text-gray-300">|</span>
                <button id="lang-bg" class="font-semibold hover:text-blue-500 transition-colors">BG</button>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-16">
        <div class="text-center">
            <h1 class="text-5xl font-extrabold text-gray-800 mb-4" data-key="welcome">Welcome!</h1>
            <p class="text-xl text-gray-600 mb-12" data-key="exploreMenu">Explore our delicious menu.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-12">
            <!-- Drinks Card -->
            <div id="drinks-card" class="menu-card bg-cover bg-center rounded-lg overflow-hidden cursor-pointer h-80" style="background-image: url('https://images.unsplash.com/photo-1514362545857-3bc7dca47259?q=80&w=2070&auto=format&fit=crop');">
                <div class="bg-black bg-opacity-50 h-full flex items-center justify-center">
                    <h2 class="text-4xl font-bold text-white" data-key="drinks">Drinks</h2>
                </div>
            </div>

            <!-- Food Card -->
            <div id="food-card" class="menu-card bg-cover bg-center rounded-lg overflow-hidden cursor-pointer h-80" style="background-image: url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=1981&auto=format&fit=crop');">
                <div class="bg-black bg-opacity-50 h-full flex items-center justify-center">
                    <h2 class="text-4xl font-bold text-white" data-key="food">Food</h2>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white p-4 text-center mt-16">
        <p data-key="copyright">&copy; 2025 The Cafe. All rights reserved.</p>
    </footer>

    <script src="JS/translations.js"></script>
    <script src="JS/main.js"></script>
</body>
</html>
