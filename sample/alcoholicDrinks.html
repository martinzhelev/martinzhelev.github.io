<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcoholic Drinks Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">
    <header class="bg-white shadow-md sticky top-0 z-10">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-gray-800 logoFirm cursor-pointer">
                <i class="fas fa-martini-glass-citrus"></i> <span data-key="theCafe">The Cafe</span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="drinks.html" class="text-gray-600 hover:text-gray-800 flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i><span data-key="backToDrinks">Back to Drinks</span>
                </a>
                <div class="text-sm">
                    <button id="lang-en" class="font-semibold hover:text-blue-500 transition-colors">EN</button>
                    <span class="text-gray-300">|</span>
                    <button id="lang-bg" class="font-semibold hover:text-blue-500 transition-colors">BG</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-16">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-gray-800" data-key="alcoholicDrinksTitle">Alcoholic Drinks</h1>
            <p class="text-xl text-gray-600 mt-2" data-key="alcoholicDrinksSubtitle">Carefully crafted for your enjoyment.</p>
        </div>

        <div class="max-w-sm mx-auto">
            <!-- Craft IPA -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden flex flex-col">
                <img src="https://images.unsplash.com/photo-1535958636474-b021ee8876a3?q=80&w=1000&auto=format&fit=crop" alt="Craft IPA" class="w-full h-56 object-cover" loading="lazy">
                <div class="p-6 flex-grow flex flex-col">
                    <div class="flex justify-between items-baseline mb-2">
                        <h3 class="text-2xl font-semibold" data-key="craftIpa">Craft IPA</h3>
                        <span class="font-bold text-xl text-gray-800">€6.00</span>
                    </div>
                    <p class="text-gray-600 flex-grow" data-key="craftIpaDesc">A hoppy and refreshing India Pale Ale from a local brewery.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white p-4 text-center mt-16">
        <p data-key="copyright">&copy; 2025 The Cafe. All rights reserved.</p>
    </footer>

    <script src="JS/translations.js"></script>
    <script src="JS/main.js"></script>
</body>
</html>
